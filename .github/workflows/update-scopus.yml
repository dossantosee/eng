name: Update Scopus Data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Playwright and Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch Scopus data
        # Safety net: keeps the job green if Scopus, Playwright,
        # or the runner unexpectedly fails.
        continue-on-error: true
        run: |
          # The current Python script uses headless=False.
          # xvfb provides a virtual display for the GitHub Actions runner.
          xvfb-run -a python fetch_codes/fetch_scopus.py

      - name: Upload debugging files if extraction fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scopus-debug-files
          path: |
            scopus_debug.html
            scopus_debug.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # The Python script writes this file only after validating that
          # all required fields are present and JSON serialization succeeds.
          if [ -f fetch_data/scopus_data.json ]; then
            git add fetch_data/scopus_data.json

            if git diff --cached --quiet; then
              echo "No changes in data. Skipping commit."
            else
              git commit -m "Auto-update bibliometric data"
              git push
            fi
          else
            echo "scopus_data.json does not exist. Nothing to commit."
          fi
