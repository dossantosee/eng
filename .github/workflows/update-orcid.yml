name: Update ORCID Data

# Run automatically every Sunday at 12:00 UTC, and allow manual triggers.
on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows github-actions[bot] to commit and push updates.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jsonschema deep-translator playwright
          playwright install --with-deps chromium

      - name: Fetch ORCID data
        # Keeps the workflow running even if ORCID/API/browser extraction fails.
        continue-on-error: true
        env:
          ORCID_USER: ${{ secrets.ORCID_USER }}
        run: |
          python fetch_codes/fetch_orcid.py

      - name: Commit and push if ORCID data changed
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add fetch_data/ORCID_data.json

          if ! git diff --cached --quiet; then
            git commit -m "Auto-update ORCID data"
            git push
          else
            echo "No ORCID data changes to commit."
          fi
