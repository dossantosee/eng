name: Update ORCID Data

# Run automatically at midnight UTC everyday, and allow manual button triggers
on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to commit changes
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Fetch ORCID data via Python & Firecrawl
        # Ignores scraping errors so GitHub doesn't mark the whole run as "Failed"
        continue-on-error: true
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ORCID_USER: ${{ secrets.ORCID_USER }}
        run: |
          python fetch_codes/fetch_orcid.py

      - name: Commit and push if changed
        # Ignores git errors just in case something acts up here too
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fetch_data/ORCID_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ORCID data" && git push)
