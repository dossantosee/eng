name: Update Patent Data

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright deep-translator

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Fetch patent data
        # The Python script preserves the existing JSON when WIPO fails.
        # This additionally prevents an unexpected runner/script failure
        # from stopping the commit verification step.
        continue-on-error: true
        env:
          INVENTOR_NAME: ${{ secrets.INVENTOR_NAME }}
          WIPO_HEADLESS: "true"
        run: python fetch_codes/fetch_patents.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f fetch_data/patent_data.json ]; then
            git add fetch_data/patent_data.json

            if git diff --cached --quiet; then
              echo "No changes in patent data. Skipping commit."
            else
              git commit -m "Auto-update patent data"
              git push
            fi
          else
            echo "fetch_data/patent_data.json does not exist. Nothing to commit."
          fi
