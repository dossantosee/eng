name: Update Patent Data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Fetch patent data
        # Safety net: keeps the job green even on an unexpected runner crash
        continue-on-error: true
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          INVENTOR_NAME: ${{ secrets.INVENTOR_NAME }}
        run: python fetch_codes/fetch_patents.py

      - name: Commit and push changes
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f fetch_data/patent_data.json ]; then
            git add fetch_data/patent_data.json

            if git diff-index --quiet HEAD; then
              echo "No changes in data. Skipping commit."
            else
              git commit -m "Auto-update patents data"
              git push
            fi
          else
            echo "patent_data.json does not exist. Nothing to commit."
          fi
